name: Auto Article (WordPress)

on:
  workflow_dispatch:
  schedule:
    # Pazartesi, Çarşamba, Cuma — Türkiye saati 05:00 (UTC+3) => 02:00 UTC
    - cron: "0 2 * * 1,3,5"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check
        run: node --check scripts/generate-wp-article.mjs

      - name: Generate and publish article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_ENABLE_SEARCH_GROUNDING: ${{ secrets.GEMINI_ENABLE_SEARCH_GROUNDING }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APPLICATION_PASSWORD: ${{ secrets.WP_APPLICATION_PASSWORD }}
          WP_POST_STATUS: publish
        run: npm run generate:auto-article

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated-articles/history.json
          git diff --staged --quiet || git commit -m "chore: update auto-article history [skip ci]"
          git push
